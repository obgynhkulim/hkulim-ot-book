<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O&G OT Management System - Hospital Kulim</title>
    
    <!-- Tailwind CSS for utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Chart.js for Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gray: {
                            50: '#f9f8f6',  // Lightest beige
                            100: '#f5f1e7', // Soft beige
                            200: '#e2d9c8', // Darker beige border
                            300: '#cbbda5', 
                            400: '#a47781', // Muted burgundy
                            500: '#8c5060', // Medium burgundy
                            600: '#732c40', 
                            700: '#800020', // Burgundy
                            800: '#5a0016', // Dark Burgundy
                            900: '#400010', // Darkest Burgundy
                        }
                    }
                }
            }
        }
    </script>

    <!-- Firebase SDKs -->
    <script type="module" id="firebase-init">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyDIJ-58I316DwaH8KQRkIC4JZitF-2mrb0",
  authDomain: "hkulim-ot-book.firebaseapp.com",
  projectId: "hkulim-ot-book",
  storageBucket: "hkulim-ot-book.firebasestorage.app",
  messagingSenderId: "67677248210",
  appId: "1:67677248210:web:b1af2f26abfd1193116b0b"
};
        
        let app, db, auth;
        
        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
            
            window.fbDb = db;
            window.fbAuth = auth;
            window.fbAppId = appId;
            window.fbCollection = collection;
            window.fbOnSnapshot = onSnapshot;
            window.fbDoc = doc;
            window.fbSetDoc = setDoc;
            window.fbUpdateDoc = updateDoc;
            window.fbDeleteDoc = deleteDoc;
            window.fbQuery = query;

            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    window.dispatchEvent(new Event('firebase-ready'));
                } catch (error) {
                    console.error("Auth error:", error);
                }
            };
            initAuth();
        } catch (e) {
            console.error("Firebase init failed", e);
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        /* Minimalist Monochrome Theme Variables */
        :root {
            --mono-bg: #f9f8f6; /* Lightest beige */
            --mono-surface: #ffffff;
            --mono-border: #e2d9c8; /* Beige border */
            --mono-text: #5a0016; /* Dark burgundy */
            --mono-text-muted: #8c5060; /* Muted burgundy */
            --mono-accent: #f5f1e7; /* Soft beige */
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--mono-bg); 
            color: var(--mono-text);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--mono-bg); }
        ::-webkit-scrollbar-thumb { 
            background: var(--mono-border); 
            border-radius: 4px; 
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--mono-text-muted); }

        /* --- MINIMALIST CLASSES (Retained class names for compatibility) --- */
        
        .clay-bg { background-color: var(--mono-bg); }

        /* Flat Cards */
        .clay-card {
            background: var(--mono-surface);
            border: 1px solid var(--mono-border);
            border-radius: 8px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        /* Inset containers */
        .clay-inset {
            background: var(--mono-bg);
            border: 1px solid var(--mono-border);
            border-radius: 6px;
        }

        /* Form Inputs */
        .clay-input {
            background: var(--mono-surface);
            border: 1px solid var(--mono-border);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            width: 100%;
            color: var(--mono-text);
            transition: all 0.2s ease;
        }
        .clay-input:focus {
            outline: none;
            border-color: var(--mono-text);
            box-shadow: 0 0 0 1px var(--mono-text);
        }
        .clay-input:disabled { opacity: 0.6; background: var(--mono-bg); }

        /* Primary Action Buttons */
        .clay-btn-primary {
            background: var(--mono-text);
            color: var(--mono-surface);
            border-radius: 6px;
            border: 1px solid var(--mono-text);
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .clay-btn-primary:hover {
            background: #800020;
        }
        .clay-btn-primary:active {
            transform: scale(0.98);
        }

        /* Secondary/Neutral Buttons */
        .clay-btn-secondary {
            background: var(--mono-surface);
            color: var(--mono-text);
            border-radius: 6px;
            border: 1px solid var(--mono-border);
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .clay-btn-secondary:hover {
            background: var(--mono-accent);
        }
        .clay-btn-secondary:active, .clay-btn-secondary.active {
            background: var(--mono-text);
            color: var(--mono-surface);
            border-color: var(--mono-text);
        }

        /* Sidebar Navigation Items */
        .clay-nav-item {
            background: transparent;
            transition: all 0.2s ease;
            color: var(--mono-text-muted);
            font-weight: 500;
            border-radius: 6px;
        }
        .clay-nav-item:hover { 
            color: var(--mono-text); 
            background: var(--mono-accent);
        }
        .clay-nav-item.active {
            color: var(--mono-surface);
            background: var(--mono-text);
            font-weight: 600;
        }

        /* Small Icons/Badges */
        .clay-icon-bubble {
            border: 1px solid var(--mono-border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .clay-status-badge {
            border: 1px solid var(--mono-border);
        }

        /* KPI Alert Color */
        .kpi-alert { background-color: #f5f1e7 !important; border-left: 4px solid #800020 !important; }
        .kpi-text { color: #800020; font-weight: 700; text-transform: uppercase; }

        /* Drag and Drop styles */
        .dragging { opacity: 0.5; background: var(--mono-bg); }
        .drag-over { border-top: 2px dashed var(--mono-text); }

        /* Print Styles mimicking the official document */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area {
                position: absolute; left: 0; top: 0; width: 100%;
                background: white; padding: 20px; font-family: 'Times New Roman', Times, serif;
            }
            .no-print { display: none !important; }
            .print-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            .print-table th, .print-table td { border: 1px solid black; padding: 8px; font-size: 11pt; text-align: left; }
            .print-table th { font-weight: bold; text-align: center; }
            .print-header { text-align: center; font-weight: bold; margin-bottom: 30px; font-size: 14pt; }
            .print-signatures { display: flex; justify-content: space-between; margin-top: 50px; font-weight: bold; }
            .print-sig-box { text-align: left; width: 30%; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        const CREDENTIALS = {
            'obgynhkulim@gmail.com': { password: 'Hospital.kulim', role: 'admin' },
            'obgyn.hkulim@moh.gov.my': { password: 'Hospital.kulim', role: 'admin' },
            'staff@hkulim.gov.my': { password: 'ot123', role: 'staff' }
        };

        const INITIAL_CASES = []; 

        const checkKPI = (bookingDate, proposedDate) => {
            if (!bookingDate || !proposedDate) return false;
            const bDate = new Date(bookingDate);
            const pDate = new Date(proposedDate);
            const diffTime = Math.abs(pDate - bDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays > 42;
        };

        const formatDate = (dateString) => {
            if (!dateString) return '-';
            const options = { day: '2-digit', month: '2-digit', year: 'numeric' };
            return new Date(dateString).toLocaleDateString('en-GB', options);
        };

        const Login = ({ onLogin }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                const user = CREDENTIALS[email.toLowerCase()];
                if (user && user.password === password) {
                    onLogin({ email, role: user.role });
                } else {
                    setError('Invalid email or password');
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center clay-bg px-4">
                    <div className="max-w-md w-full clay-card p-8 text-center">
                        <div className="mb-8">
                            <div className="w-24 h-24 mx-auto mb-4 overflow-hidden rounded-full border-4 border-white shadow-md flex items-center justify-center bg-white">
                                <img src="obgynlogorasmi.jpeg" alt="O&G Hospital Kulim Logo" className="w-full h-full object-cover" onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/200x200/8c5060/ffffff?text=O%26G'; }} />
                            </div>
                            <h2 className="text-2xl font-bold text-gray-800">O&G Dept. Hospital Kulim</h2>
                            <p className="text-gray-500 mt-2 font-medium">Operation Theatre Management</p>
                        </div>
                        
                        <form onSubmit={handleLogin} className="space-y-6 text-left">
                            <div>
                                <label className="block text-sm font-semibold text-gray-600 mb-2 ml-2">Email Address</label>
                                <input type="email" value={email} onChange={e => setEmail(e.target.value)} required
                                    className="clay-input" placeholder="admin or staff email" />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-gray-600 mb-2 ml-2">Password</label>
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)} required
                                    className="clay-input" />
                            </div>
                            {error && <p className="text-red-500 text-sm font-semibold text-center">{error}</p>}
                            
                            <button type="submit" className="w-full clay-btn-primary py-3 text-lg mt-4">
                                Sign In
                            </button>
                        </form>
                        
                        <div className="mt-8 pt-6 border-t border-gray-300/30 text-xs text-gray-500 font-medium">
                            <p>Admin access requires authorized MOH credentials.</p>
                            <p className="mt-1">Staff view: staff@hkulim.gov.my / ot123</p>
                        </div>
                    </div>
                </div>
            );
        };

        const CaseModal = ({ isOpen, onClose, onSave, editingCase, userRole }) => {
            if (!isOpen) return null;

            const [formData, setFormData] = useState(editingCase || {
                type: 'Elective', category: 'Obstetrics', patientName: '', ic: '', age: '', contact: '',
                diagnosis: '', procedure: '', bookingSurgeon: '', bookingDate: '', proposedDate: '',
                anaesthReferral: 'No', remarks: '', status: 'Scheduled', specialistInCharge: '',
                rescheduleReason: '', newDate: ''
            });
            const [dateWarning, setDateWarning] = useState('');

            useEffect(() => {
                if (formData.proposedDate && formData.type === 'Elective') {
                    const date = new Date(formData.proposedDate);
                    const day = date.getDay(); 
                    if (formData.category === 'Obstetrics') {
                        if (day === 5 || day === 6) setDateWarning('Warning: Obs Elective OT is usually Sun-Thu.');
                        else setDateWarning('');
                    } else if (formData.category === 'Gynaecology') {
                        if (day !== 2) setDateWarning('Warning: Gynae Elective OT is usually on Tuesdays.');
                        else setDateWarning('');
                    } else if (formData.category === 'Saturday OT') {
                        if (day !== 6) setDateWarning('Warning: Selected date is not a Saturday.');
                        else setDateWarning('');
                    }
                } else {
                    setDateWarning('');
                }
            }, [formData.proposedDate, formData.category, formData.type]);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(formData);
            };

            const isKPIBreached = checkKPI(formData.bookingDate, formData.proposedDate);

            if (userRole !== 'admin') {
                return (
                    <div className="fixed inset-0 backdrop-blur-sm bg-slate-900/30 flex items-center justify-center p-4 z-50">
                        <div className="clay-card p-8 max-w-sm w-full text-center">
                            <div className="clay-icon-bubble w-16 h-16 mx-auto bg-gray-200 text-gray-900 mb-4">
                                <i data-lucide="shield-alert" className="w-8 h-8"></i>
                            </div>
                            <h3 className="text-xl font-bold text-gray-800 mb-2">Access Denied</h3>
                            <p className="text-gray-600 mb-6 font-medium">Only Administrators can add or edit cases.</p>
                            <button onClick={onClose} className="clay-btn-secondary w-full">Close</button>
                        </div>
                    </div>
                )
            }

            return (
                <div className="fixed inset-0 backdrop-blur-sm bg-slate-900/30 flex items-center justify-center p-4 z-50 overflow-y-auto">
                    <div className="clay-card w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">
                        <div className="px-8 py-5 flex justify-between items-center z-10 border-b border-white/40">
                            <h2 className="text-2xl font-bold text-gray-800">{editingCase ? 'Edit Case Details' : 'Add New Case'}</h2>
                            <button onClick={onClose} className="clay-btn-secondary p-2 rounded-full h-10 w-10 flex items-center justify-center">
                                <i data-lucide="x" className="w-5 h-5"></i>
                            </button>
                        </div>
                        
                        <div className="overflow-y-auto p-8 flex-grow">
                            <form onSubmit={handleSubmit} className="space-y-8">
                                {/* Classification */}
                                <div className="clay-inset p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">List Type</label>
                                        <select name="type" value={formData.type} onChange={handleChange} className="clay-input">
                                            <option value="Elective">Elective</option>
                                            <option value="Emergency">Emergency</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Category</label>
                                        <select name="category" value={formData.category} onChange={handleChange} className="clay-input">
                                            <option value="Obstetrics">Obstetrics</option>
                                            <option value="Gynaecology">Gynaecology</option>
                                            {formData.type === 'Elective' && <option value="Saturday OT">Saturday OT</option>}
                                        </select>
                                    </div>
                                </div>

                                {/* Patient Demographics */}
                                <div className="clay-inset p-6 grid grid-cols-1 md:grid-cols-4 gap-6">
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Patient Name</label>
                                        <input type="text" name="patientName" value={formData.patientName} onChange={handleChange} required className="clay-input uppercase" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">IC Number</label>
                                        <input type="text" name="ic" value={formData.ic} onChange={handleChange} required className="clay-input" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Age</label>
                                        <input type="number" name="age" value={formData.age} onChange={handleChange} required className="clay-input" />
                                    </div>
                                    <div className="md:col-span-4 lg:col-span-2">
                                        <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Contact Number</label>
                                        <input type="text" name="contact" value={formData.contact} onChange={handleChange} className="clay-input" />
                                    </div>
                                </div>

                                {/* Medical Details */}
                                <div className="clay-inset p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Diagnosis</label>
                                        <textarea name="diagnosis" value={formData.diagnosis} onChange={handleChange} rows="2" required className="clay-input uppercase resize-none"></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Planned Procedure</label>
                                        <textarea name="procedure" value={formData.procedure} onChange={handleChange} rows="2" required className="clay-input uppercase resize-none"></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Comorbids / Remarks</label>
                                        <textarea name="remarks" value={formData.remarks} onChange={handleChange} rows="2" className="clay-input uppercase resize-none"></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Anaesth Referral</label>
                                        <select name="anaesthReferral" value={formData.anaesthReferral} onChange={handleChange} className="clay-input">
                                            <option value="No">No</option>
                                            <option value="Yes - Pending">Yes - Pending Review</option>
                                            <option value="Yes - Seen">Yes - Seen & Optimized</option>
                                        </select>
                                    </div>
                                </div>

                                {/* Scheduling */}
                                <div className="clay-inset p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Booking Surgeon</label>
                                        <input type="text" name="bookingSurgeon" value={formData.bookingSurgeon} onChange={handleChange} required className="clay-input uppercase" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Specialist In-Charge</label>
                                        <input type="text" name="specialistInCharge" value={formData.specialistInCharge} onChange={handleChange} required className="clay-input uppercase" />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Booking Date</label>
                                        <input type="date" name="bookingDate" value={formData.bookingDate} onChange={handleChange} required className="clay-input" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Proposed Operation Date</label>
                                        <input type="date" name="proposedDate" value={formData.proposedDate} onChange={handleChange} required className={`clay-input ${isKPIBreached ? 'text-black font-bold border-black' : ''}`} />
                                        {dateWarning && <p className="text-xs text-gray-700 mt-2 ml-1 font-semibold">{dateWarning}</p>}
                                        {isKPIBreached && <p className="text-xs text-black font-bold mt-2 ml-1 flex items-center"><i data-lucide="alert-triangle" className="w-4 h-4 mr-1"></i> KPI &gt; 6 Weeks Alert!</p>}
                                    </div>
                                </div>

                                {/* Status */}
                                <div className="clay-inset p-6">
                                    <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Current Status</label>
                                    <select name="status" value={formData.status} onChange={handleChange} className="clay-input mb-4 font-semibold">
                                        <option value="Scheduled">Scheduled</option>
                                        <option value="In Progress">In Progress</option>
                                        <option value="Completed">Completed</option>
                                        <option value="Delayed">Delayed</option>
                                        <option value="Rescheduled">Rescheduled</option>
                                        <option value="Cancelled">Cancelled</option>
                                    </select>

                                    {(formData.status === 'Rescheduled' || formData.status === 'Cancelled') && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4 pt-4 border-t border-white/30">
                                            <div>
                                                <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Reason</label>
                                                <input type="text" name="rescheduleReason" value={formData.rescheduleReason} onChange={handleChange} required className="clay-input" placeholder="e.g., Unfit for surgery..." />
                                            </div>
                                            {formData.status === 'Rescheduled' && (
                                                <div>
                                                    <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">New Operation Date</label>
                                                    <input type="date" name="newDate" value={formData.newDate} onChange={handleChange} required className="clay-input" />
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <div className="flex justify-end space-x-4 pt-4">
                                    <button type="button" onClick={onClose} className="clay-btn-secondary">Cancel</button>
                                    <button type="submit" className="clay-btn-primary">
                                        <i data-lucide="save" className="w-5 h-5 mr-2"></i> Save Case
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ cases }) => {
            const todayStr = new Date().toISOString().split('T')[0];
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = tomorrow.toISOString().split('T')[0];

            const todayCases = cases.filter(c => c.proposedDate === todayStr);
            const tomorrowCases = cases.filter(c => c.proposedDate === tomorrowStr);
            const emergencyCases = cases.filter(c => c.type === 'Emergency' && (c.status === 'Scheduled' || c.status === 'In Progress'));

            const otBoardCases = [...todayCases].sort((a, b) => (a.order || 0) - (b.order || 0));

            const getStatusColor = (status) => {
                switch(status) {
                    case 'Completed': return 'bg-gray-900 text-white';
                    case 'In Progress': return 'bg-gray-500 text-white';
                    case 'Scheduled': return 'bg-gray-200 text-gray-800';
                    case 'Delayed': return 'bg-gray-100 text-gray-900 border border-gray-400';
                    default: return 'bg-gray-100 text-gray-600';
                }
            };

            return (
                <div className="space-y-8">
                    {/* Summary Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div className="clay-card p-6 flex items-center">
                            <div className="clay-icon-bubble w-16 h-16 bg-gray-100 text-gray-800 mr-6">
                                <i data-lucide="calendar-check" className="w-8 h-8"></i>
                            </div>
                            <div>
                                <p className="text-sm text-gray-500 font-bold tracking-wide uppercase">Today's Cases</p>
                                <p className="text-4xl font-extrabold text-gray-800">{todayCases.length}</p>
                            </div>
                        </div>
                        <div className="clay-card p-6 flex items-center">
                            <div className="clay-icon-bubble w-16 h-16 bg-gray-200 text-gray-800 mr-6">
                                <i data-lucide="calendar-clock" className="w-8 h-8"></i>
                            </div>
                            <div>
                                <p className="text-sm text-gray-500 font-bold tracking-wide uppercase">Tomorrow's Cases</p>
                                <p className="text-4xl font-extrabold text-gray-800">{tomorrowCases.length}</p>
                            </div>
                        </div>
                        <div className="clay-card p-6 flex items-center">
                            <div className="clay-icon-bubble w-16 h-16 bg-gray-300 text-gray-900 mr-6">
                                <i data-lucide="alert-circle" className="w-8 h-8"></i>
                            </div>
                            <div>
                                <p className="text-sm text-gray-500 font-bold tracking-wide uppercase">Active Emergencies</p>
                                <p className="text-4xl font-extrabold text-gray-800">{emergencyCases.length}</p>
                            </div>
                        </div>
                    </div>

                    {/* Today's OT Board */}
                    <div className="clay-card overflow-hidden">
                        <div className="px-8 py-5 border-b border-gray-200 flex items-center">
                            <div className="clay-icon-bubble w-10 h-10 bg-gray-100 text-gray-800 mr-4">
                                <i data-lucide="monitor-play" className="w-5 h-5"></i>
                            </div>
                            <h3 className="text-xl font-bold text-gray-800">Today's OT Board</h3>
                        </div>
                        <div className="p-6">
                            <div className="clay-inset overflow-x-auto p-2">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="text-gray-500 border-b border-gray-300/50">
                                            <th className="p-4 font-bold text-sm tracking-wide">SEQ</th>
                                            <th className="p-4 font-bold text-sm tracking-wide">PATIENT DETAILS</th>
                                            <th className="p-4 font-bold text-sm tracking-wide">PROCEDURE</th>
                                            <th className="p-4 font-bold text-sm tracking-wide">SURGEON</th>
                                            <th className="p-4 font-bold text-sm tracking-wide">STATUS</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {otBoardCases.length === 0 ? (
                                            <tr><td colSpan="5" className="p-8 text-center text-gray-500 font-medium">No cases scheduled for today.</td></tr>
                                        ) : (
                                            otBoardCases.map((c, idx) => (
                                                <tr key={c.id} className="border-b border-gray-300/30 hover:bg-white/20 transition-colors">
                                                    <td className="p-4 font-extrabold text-gray-400 text-lg">#{idx + 1}</td>
                                                    <td className="p-4">
                                                        <div className="font-bold text-gray-800 uppercase">{c.patientName}</div>
                                                        <div className="text-xs text-gray-500 font-medium mt-1">{c.age} Y/O | {c.category}</div>
                                                    </td>
                                                    <td className="p-4 text-sm font-semibold text-gray-700 uppercase max-w-xs truncate" title={c.procedure}>{c.procedure}</td>
                                                    <td className="p-4 text-sm font-semibold text-gray-700 uppercase">
                                                        <div>{c.bookingSurgeon}</div>
                                                        <div className="text-xs text-gray-500 font-medium mt-1">{c.specialistInCharge}</div>
                                                    </td>
                                                    <td className="p-4">
                                                        <span className={`px-4 py-1.5 rounded-full text-xs font-bold clay-status-badge ${getStatusColor(c.status)}`}>
                                                            {c.status}
                                                        </span>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const CaseList = ({ cases, type, userRole, onEdit, onUpdateOrder }) => {
            const [filterCategory, setFilterCategory] = useState('All');
            const [search, setSearch] = useState('');
            const [draggedItem, setDraggedItem] = useState(null);

            let filteredCases = cases.filter(c => c.type === type);
            if (filterCategory !== 'All') {
                filteredCases = filteredCases.filter(c => c.category === filterCategory);
            }
            if (search) {
                const s = search.toLowerCase();
                filteredCases = filteredCases.filter(c => 
                    c.patientName.toLowerCase().includes(s) || 
                    c.ic.includes(s) || 
                    c.procedure.toLowerCase().includes(s)
                );
            }

            filteredCases.sort((a, b) => {
                if (a.proposedDate !== b.proposedDate) {
                    return new Date(a.proposedDate) - new Date(b.proposedDate);
                }
                return (a.order || 0) - (b.order || 0);
            });

            const handleDragStart = (e, index) => {
                if (userRole !== 'admin') return;
                setDraggedItem(index);
                e.dataTransfer.effectAllowed = 'move';
                e.target.classList.add('dragging');
            };

            const handleDragEnd = (e) => {
                e.target.classList.remove('dragging');
                setDraggedItem(null);
                document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            };

            const handleDragOver = (e, index) => {
                e.preventDefault();
                if (draggedItem === null || draggedItem === index || userRole !== 'admin') return;
                e.currentTarget.classList.add('drag-over');
            };

            const handleDragLeave = (e) => {
                e.currentTarget.classList.remove('drag-over');
            };

            const handleDrop = (e, targetIndex) => {
                e.preventDefault();
                e.currentTarget.classList.remove('drag-over');
                
                if (draggedItem === null || draggedItem === targetIndex || userRole !== 'admin') return;

                const newItems = [...filteredCases];
                const draggedCase = newItems[draggedItem];
                
                newItems.splice(draggedItem, 1);
                newItems.splice(targetIndex, 0, draggedCase);

                const updates = newItems.map((item, idx) => ({
                    id: item.id,
                    order: idx
                }));

                onUpdateOrder(updates);
                setDraggedItem(null);
            };

            return (
                <div className="h-full flex flex-col space-y-6">
                    {/* Toolbar */}
                    <div className="clay-card p-4 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex space-x-3 w-full md:w-auto overflow-x-auto pb-2 md:pb-0">
                            {['All', 'Obstetrics', 'Gynaecology', ...(type === 'Elective' ? ['Saturday OT'] : [])].map(cat => (
                                <button key={cat} onClick={() => setFilterCategory(cat)}
                                    className={`whitespace-nowrap ${filterCategory === cat ? 'clay-btn-secondary active' : 'clay-btn-secondary'}`}>
                                    {cat}
                                </button>
                            ))}
                        </div>
                        <div className="relative w-full md:w-80">
                            <i data-lucide="search" className="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                            <input type="text" placeholder="Search Name, IC, Procedure..." value={search} onChange={e => setSearch(e.target.value)}
                                className="clay-input pl-11" />
                        </div>
                    </div>

                    {/* Table Container */}
                    <div className="clay-card flex-grow overflow-hidden flex flex-col p-6">
                        <div className="clay-inset flex-grow overflow-auto p-2">
                            <table className="w-full text-left border-collapse text-sm min-w-[1000px]">
                                <thead>
                                    <tr className="text-gray-500 border-b border-gray-300/50">
                                        {userRole === 'admin' && <th className="p-4 w-10"></th>}
                                        <th className="p-4 font-bold tracking-wide">DATE</th>
                                        <th className="p-4 font-bold tracking-wide">PATIENT</th>
                                        <th className="p-4 font-bold tracking-wide">PROCEDURE</th>
                                        <th className="p-4 font-bold tracking-wide">SURGEON</th>
                                        <th className="p-4 font-bold tracking-wide">STATUS</th>
                                        <th className="p-4 font-bold tracking-wide">KPI</th>
                                        <th className="p-4 font-bold tracking-wide text-right">ACTION</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredCases.length === 0 ? (
                                        <tr><td colSpan="8" className="p-8 text-center text-gray-500 font-medium">No cases found matching criteria.</td></tr>
                                    ) : (
                                        filteredCases.map((c, index) => {
                                            const isBreached = checkKPI(c.bookingDate, c.proposedDate);
                                            return (
                                                <tr key={c.id} 
                                                    draggable={userRole === 'admin'}
                                                    onDragStart={(e) => handleDragStart(e, index)}
                                                    onDragEnd={handleDragEnd}
                                                    onDragOver={(e) => handleDragOver(e, index)}
                                                    onDragLeave={handleDragLeave}
                                                    onDrop={(e) => handleDrop(e, index)}
                                                    className={`border-b border-gray-300/30 transition-all hover:bg-white/30 ${isBreached ? 'kpi-alert' : ''}`}
                                                >
                                                    {userRole === 'admin' && (
                                                        <td className="p-4 text-gray-400 cursor-grab active:cursor-grabbing">
                                                            <i data-lucide="grip-vertical" className="w-5 h-5"></i>
                                                        </td>
                                                    )}
                                                    <td className="p-4 font-bold text-gray-700">{formatDate(c.proposedDate)}</td>
                                                    <td className="p-4">
                                                        <div className="font-bold uppercase text-gray-800">{c.patientName}</div>
                                                        <div className="text-xs text-gray-500 font-medium mt-1">{c.ic} | {c.age} y/o</div>
                                                    </td>
                                                    <td className="p-4 max-w-xs">
                                                        <div className="truncate uppercase font-bold text-gray-700" title={c.diagnosis}>{c.diagnosis}</div>
                                                        <div className="truncate text-xs text-gray-500 uppercase font-medium mt-1" title={c.procedure}>{c.procedure}</div>
                                                    </td>
                                                    <td className="p-4 uppercase font-semibold text-gray-700">
                                                        <div>{c.bookingSurgeon}</div>
                                                        <div className="text-xs text-gray-500 mt-1">{c.specialistInCharge}</div>
                                                    </td>
                                                    <td className="p-4">
                                                        <span className={`px-3 py-1.5 rounded-full text-xs font-bold clay-status-badge ${
                                                            c.status === 'Completed' ? 'bg-gray-900 text-white' :
                                                            c.status === 'Cancelled' ? 'bg-gray-100 text-gray-500 line-through' :
                                                            c.status === 'Delayed' ? 'bg-gray-100 text-gray-900 border border-gray-400' :
                                                            c.status === 'In Progress' ? 'bg-gray-500 text-white' :
                                                            'bg-gray-200 text-gray-800'
                                                        }`}>
                                                            {c.status}
                                                        </span>
                                                    </td>
                                                    <td className="p-4">
                                                        {isBreached ? <span className="kpi-text text-xs border border-black px-2 py-1 rounded-md bg-gray-100 text-black font-bold" title="&gt; 6 weeks from booking">Alert</span> : <span className="text-gray-400 font-semibold text-xs">OK</span>}
                                                    </td>
                                                    <td className="p-4 text-right">
                                                        <button onClick={() => onEdit(c)} className="clay-btn-secondary p-2 !rounded-full h-10 w-10 text-gray-800">
                                                            <i data-lucide={userRole === 'admin' ? 'edit' : 'eye'} className="w-4 h-4"></i>
                                                        </button>
                                                    </td>
                                                </tr>
                                            );
                                        })
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const Analytics = ({ cases }) => {
            const chartRef1 = useRef(null);
            const chartRef2 = useRef(null);
            const chartRef3 = useRef(null);
            const charts = useRef({});

            useEffect(() => {
                if (!window.Chart) return;
                
                Object.values(charts.current).forEach(chart => chart.destroy());
                charts.current = {};

                // Default Chart options for clay look
                Chart.defaults.color = '#8c5060';
                Chart.defaults.font.family = 'Inter';
                Chart.defaults.font.weight = '600';

                // 1. Elective vs Emergency
                const typeCounts = cases.reduce((acc, c) => {
                    acc[c.type] = (acc[c.type] || 0) + 1; return acc;
                }, {});
                
                if(chartRef1.current) {
                    charts.current.typeChart = new Chart(chartRef1.current, {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(typeCounts),
                            datasets: [{
                                data: Object.values(typeCounts),
                                backgroundColor: ['#5a0016', '#cbbda5'],
                                borderWidth: 0,
                                hoverOffset: 4
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, cutout: '70%' }
                    });
                }

                // 2. Gynae Procedures
                const gynaeCases = cases.filter(c => c.category === 'Gynaecology');
                const procCounts = gynaeCases.reduce((acc, c) => {
                    let proc = c.procedure.split(' ')[0].toUpperCase();
                    if(proc.length < 3) proc = "OTHER";
                    acc[proc] = (acc[proc] || 0) + 1; return acc;
                }, {});

                if(chartRef2.current) {
                    charts.current.gynaeChart = new Chart(chartRef2.current, {
                        type: 'pie',
                        data: {
                            labels: Object.keys(procCounts).slice(0, 6),
                            datasets: [{
                                data: Object.values(procCounts).slice(0, 6),
                                backgroundColor: ['#400010', '#5a0016', '#732c40', '#8c5060', '#a47781', '#e2d9c8'],
                                borderWidth: 0
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false }
                    });
                }

                // 3. Obs Cases by Status
                const obsCases = cases.filter(c => c.category === 'Obstetrics');
                const statCounts = obsCases.reduce((acc, c) => {
                    acc[c.status] = (acc[c.status] || 0) + 1; return acc;
                }, {});

                if(chartRef3.current) {
                    charts.current.statusChart = new Chart(chartRef3.current, {
                        type: 'bar',
                        data: {
                            labels: Object.keys(statCounts),
                            datasets: [{
                                label: 'Cases',
                                data: Object.values(statCounts),
                                backgroundColor: '#732c40',
                                borderRadius: 4,
                                borderSkipped: false
                            }]
                        },
                        options: { 
                            responsive: true, maintainAspectRatio: false, 
                            scales: { 
                                y: { beginAtZero: true, ticks:{stepSize:1}, grid: {color: 'rgba(0,0,0,0.05)'} },
                                x: { grid: {display: false} } 
                            } 
                        }
                    });
                }

                return () => Object.values(charts.current).forEach(chart => chart.destroy());
            }, [cases]);

            return (
                <div className="space-y-8">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        <div className="clay-card p-6 h-96 flex flex-col">
                            <h3 className="text-lg font-bold text-gray-700 mb-6 text-center">Elective vs Emergency</h3>
                            <div className="clay-inset flex-grow relative p-4"><canvas ref={chartRef1}></canvas></div>
                        </div>
                        <div className="clay-card p-6 h-96 flex flex-col">
                            <h3 className="text-lg font-bold text-gray-700 mb-6 text-center">Top Gynae Procedures</h3>
                            <div className="clay-inset flex-grow relative p-4"><canvas ref={chartRef2}></canvas></div>
                        </div>
                        <div className="clay-card p-6 h-96 flex flex-col">
                            <h3 className="text-lg font-bold text-gray-700 mb-6 text-center">Obs Case Status</h3>
                            <div className="clay-inset flex-grow relative p-4"><canvas ref={chartRef3}></canvas></div>
                        </div>
                    </div>
                </div>
            );
        };

        const PrintTemplate = ({ cases }) => {
            const [printCategory, setPrintCategory] = useState('Gynaecology');
            const [printDate, setPrintDate] = useState(new Date().toISOString().split('T')[0]);

            const triggerPrint = () => window.print();

            const exportToCSV = () => {
                const listToPrint = cases.filter(c => c.category === printCategory && c.proposedDate === printDate)
                                         .sort((a,b) => (a.order || 0) - (b.order || 0));
                
                if (listToPrint.length === 0) { alert("No data to export for this selection."); return; }

                let csvContent = "data:text/csv;charset=utf-8,";
                csvContent += "NO,NAME,AGE,IC,DIAGNOSIS,OPERATION,MEDICAL ILLNESS/REMARKS\n";
                
                listToPrint.forEach((row, index) => {
                    const cleanStr = (str) => `"${(str || '').replace(/"/g, '""')}"`;
                    let rowArr = [
                        index + 1,
                        cleanStr(row.patientName),
                        row.age,
                        cleanStr(row.ic),
                        cleanStr(row.diagnosis),
                        cleanStr(row.procedure),
                        cleanStr(row.remarks)
                    ];
                    csvContent += rowArr.join(",") + "\n";
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `OT_List_${printCategory}_${printDate}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const listToPrint = cases.filter(c => c.category === printCategory && c.proposedDate === printDate)
                                     .sort((a,b) => (a.order || 0) - (b.order || 0));

            const specialists = [...new Set(listToPrint.map(c => c.specialistInCharge))].filter(Boolean).join(' / ') || '_________________';
            const mos = [...new Set(listToPrint.map(c => c.bookingSurgeon))].filter(Boolean).join(' / ') || '_________________';

            return (
                <div className="space-y-8">
                    <div className="clay-card p-8 mb-6 no-print flex flex-col md:flex-row items-end gap-6">
                        <div className="flex-grow w-full">
                            <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Category to Print</label>
                            <select value={printCategory} onChange={e => setPrintCategory(e.target.value)} className="clay-input">
                                <option value="Gynaecology">Gynaecology</option>
                                <option value="Obstetrics">Obstetrics</option>
                                <option value="Saturday OT">Saturday OT</option>
                            </select>
                        </div>
                        <div className="flex-grow w-full">
                            <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Date</label>
                            <input type="date" value={printDate} onChange={e => setPrintDate(e.target.value)} className="clay-input" />
                        </div>
                        <div className="flex gap-4 w-full md:w-auto">
                             <button onClick={triggerPrint} className="clay-btn-primary w-full md:w-auto">
                                <i data-lucide="printer" className="w-5 h-5 mr-2"></i> Print Document
                            </button>
                             <button onClick={exportToCSV} className="clay-btn-secondary w-full md:w-auto">
                                <i data-lucide="file-spreadsheet" className="w-5 h-5 mr-2"></i> Export CSV
                            </button>
                        </div>
                            <div className="text-center text-gray-400 mb-4 font-bold">PREVIEW ONLY (Formatting optimized on actual print)</div>
                        <div id="print-area">
                            <div className="print-header">
                                <div style={{display: 'flex', justifyContent: 'center', marginBottom: '15px'}}>
                                    <img src="obgynlogorasmi.jpeg" alt="Logo" style={{height: '90px', borderRadius: '50%'}} onError={(e) => { e.target.style.display = 'none'; }} />
                                </div>
                                OBSTETRIC AND GYNAECOLOGY DEPARTMENT<br/>
                                HOSPITAL KULIM<br/>
                                {printCategory.toUpperCase()} OPERATION LIST {formatDate(printDate)}
                            </div>
                            
                            <div style={{marginBottom: '20px', fontWeight: 'bold'}}>
                                <div style={{display: 'flex'}}><div style={{width: '120px'}}>SPECIALIST</div><div>: {specialists.toUpperCase()}</div></div>
                                <div style={{display: 'flex'}}><div style={{width: '120px'}}>MO</div><div>: {mos.toUpperCase()}</div></div>
                            </div>

                            <table className="print-table">
                                <thead>
                                    <tr>
                                        <th style={{width: '5%'}}>NO</th>
                                        <th style={{width: '20%'}}>NAME</th>
                                        <th style={{width: '5%'}}>AGE</th>
                                        <th style={{width: '15%'}}>IC</th>
                                        <th style={{width: '20%'}}>DIAGNOSIS</th>
                                        <th style={{width: '20%'}}>OPERATION</th>
                                        <th style={{width: '15%'}}>MEDICAL ILLNESS/ REMARKS</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {listToPrint.length === 0 ? (
                                        <tr><td colSpan="7" style={{textAlign: 'center', padding: '30px', color: '#666'}}>No cases scheduled.</td></tr>
                                    ) : (
                                        listToPrint.map((c, i) => (
                                            <tr key={c.id}>
                                                <td style={{textAlign: 'center'}}>{i + 1}.</td>
                                                <td style={{textTransform: 'uppercase'}}>{c.patientName}</td>
                                                <td style={{textAlign: 'center'}}>{c.age}</td>
                                                <td>{c.ic}</td>
                                                <td style={{textTransform: 'uppercase'}}>{c.diagnosis}</td>
                                                <td style={{textTransform: 'uppercase'}}>{c.procedure}</td>
                                                <td style={{textTransform: 'uppercase'}}>{c.remarks || '-'}</td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>

                            <div className="print-signatures">
                                <div className="print-sig-box">
                                    <p>PREPARED BY:</p>
                                    <div style={{height: '80px'}}></div>
                                    <p>___________________________</p>
                                </div>
                                <div className="print-sig-box">
                                    <p>VERIFIED BY:</p>
                                    <div style={{height: '80px'}}></div>
                                    <p>___________________________</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingCase, setEditingCase] = useState(null);
            const [cases, setCases] = useState([]);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [fbReady, setFbReady] = useState(false);

            useEffect(() => {
                const handler = () => setFbReady(true);
                window.addEventListener('firebase-ready', handler);
                return () => window.removeEventListener('firebase-ready', handler);
            }, []);

            useEffect(() => {
                if (!fbReady || !window.fbAuth?.currentUser) return;
                const casesRef = window.fbCollection(window.fbDb, 'artifacts', window.fbAppId, 'public', 'data', 'cases');
                const unsubscribe = window.fbOnSnapshot(casesRef, (snapshot) => {
                    const loadedCases = [];
                    snapshot.forEach((doc) => { loadedCases.push({ id: doc.id, ...doc.data() }); });
                    setCases(loadedCases);
                }, (error) => {
                    console.error("Firestore error:", error);
                    setCases([]); 
                });
                return () => unsubscribe();
            }, [fbReady, user]);

            useEffect(() => {
                lucide.createIcons();
            }, [activeTab, cases, isModalOpen]);

            const handleLogout = () => setUser(null);

            const handleSaveCase = async (formData) => {
                if (!window.fbDb || !window.fbAuth?.currentUser || user.role !== 'admin') return;
                try {
                    const isNew = !formData.id;
                    const caseData = { ...formData, updatedAt: new Date().toISOString() };
                    
                    if (isNew) {
                        caseData.createdAt = new Date().toISOString();
                        caseData.order = cases.filter(c => c.proposedDate === formData.proposedDate).length;
                        const newDocRef = window.fbDoc(window.fbCollection(window.fbDb, 'artifacts', window.fbAppId, 'public', 'data', 'cases'));
                        await window.fbSetDoc(newDocRef, caseData);
                    } else {
                        const docRef = window.fbDoc(window.fbDb, 'artifacts', window.fbAppId, 'public', 'data', 'cases', formData.id);
                        await window.fbUpdateDoc(docRef, caseData);
                    }
                    setIsModalOpen(false);
                } catch (e) {
                    alert("Error saving data. Please check connection.");
                }
            };

            const handleUpdateOrder = async (updates) => {
                if (!window.fbDb || !window.fbAuth?.currentUser || user.role !== 'admin') return;
                try {
                    for (const update of updates) {
                        const docRef = window.fbDoc(window.fbDb, 'artifacts', window.fbAppId, 'public', 'data', 'cases', update.id);
                        await window.fbUpdateDoc(docRef, { order: update.order });
                    }
                } catch (e) {}
            };

            const openAddModal = () => { setEditingCase(null); setIsModalOpen(true); };
            const openEditModal = (caseItem) => { setEditingCase(caseItem); setIsModalOpen(true); };

            if (!user) return <Login onLogin={setUser} />;

            const navItems = [
                { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                { id: 'elective', label: 'Elective List', icon: 'calendar-days' },
                { id: 'emergency', label: 'Emergency List', icon: 'ambulance' },
                { id: 'analytics', label: 'Analytics', icon: 'pie-chart' },
                { id: 'print', label: 'Print / Export', icon: 'printer' },
            ];

            return (
                <div className="h-screen flex flex-col md:flex-row clay-bg no-print p-2 md:p-6 gap-6 overflow-hidden">
                    {/* Floating Sidebar */}
                    <div className="md:w-64 clay-card flex flex-col flex-shrink-0 z-20">
                        <div className="p-6 flex justify-between items-center border-b border-gray-200">
                            <div className="flex items-center gap-3">
                                <div className="w-12 h-12 rounded-full overflow-hidden border-2 border-white shadow-sm flex-shrink-0 bg-white">
                                    <img src="obgynlogorasmi.jpeg" alt="Logo" className="w-full h-full object-cover" onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/100x100/8c5060/ffffff?text=O%26G'; }} />
                                </div>
                                <div>
                                    <h1 className="font-extrabold text-lg text-gray-900 tracking-tight leading-tight">O&G OT Mgmt</h1>
                                    <p className="text-[10px] font-bold text-gray-500 uppercase mt-0.5">Hospital Kulim</p>
                                </div>
                            </div>
                            <button className="md:hidden clay-btn-secondary p-2 !rounded-full w-10 h-10" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                                <i data-lucide={isMobileMenuOpen ? "x" : "menu"} className="w-5 h-5"></i>
                            </button>
                        </div>
                        
                        <nav className={`flex-grow p-4 space-y-3 ${isMobileMenuOpen ? 'block' : 'hidden'} md:block overflow-y-auto`}>
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }}
                                    className={`w-full flex items-center space-x-4 px-5 py-3.5 clay-nav-item ${activeTab === item.id ? 'active' : ''}`}>
                                    <i data-lucide={item.icon} className="w-5 h-5"></i>
                                    <span className="text-base">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        
                        <div className={`p-6 border-t border-gray-200 ${isMobileMenuOpen ? 'block' : 'hidden'} md:block mt-auto`}>
                            <div className="flex items-center space-x-4 mb-6">
                                <div className="w-12 h-12 clay-icon-bubble bg-gray-100 text-gray-800">
                                    <i data-lucide="user" className="w-6 h-6"></i>
                                </div>
                                <div className="overflow-hidden">
                                    <p className="text-sm font-bold text-gray-900 truncate">{user.email}</p>
                                    <p className="text-xs font-bold text-gray-500 uppercase mt-1">{user.role}</p>
                                </div>
                            </div>
                            <button onClick={handleLogout} className="w-full clay-btn-secondary text-gray-900 hover:text-black font-bold">
                                <i data-lucide="log-out" className="w-4 h-4 mr-2"></i><span>Logout</span>
                            </button>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-grow flex flex-col h-full overflow-hidden">
                        {/* Header Area */}
                        <header className="clay-card px-8 py-5 mb-6 flex justify-between items-center flex-shrink-0 z-10">
                            <h2 className="text-2xl font-extrabold text-gray-900 capitalize flex items-center">
                                {navItems.find(i=>i.id === activeTab)?.label}
                            </h2>
                            <div className="flex items-center space-x-6">
                                <div className="relative cursor-pointer text-gray-600 hover:text-black transition-colors">
                                    <i data-lucide="bell" className="w-6 h-6"></i>
                                    {cases.some(c => checkKPI(c.bookingDate, c.proposedDate)) && (
                                        <span className="absolute -top-1 -right-1 w-3 h-3 bg-black rounded-full border-2 border-white"></span>
                                    )}
                                </div>
                                {user.role === 'admin' && ['elective', 'emergency'].includes(activeTab) && (
                                    <button onClick={openAddModal} className="clay-btn-primary">
                                        <i data-lucide="plus" className="w-5 h-5 mr-2"></i> Add Case
                                    </button>
                                )}
                            </div>
                        </header>

                        {/* Scrollable Content */}
                        <main className="flex-grow overflow-auto pb-6 pr-2">
                            {activeTab === 'dashboard' && <Dashboard cases={cases} />}
                            {activeTab === 'elective' && <CaseList cases={cases} type="Elective" userRole={user.role} onEdit={openEditModal} onUpdateOrder={handleUpdateOrder} />}
                            {activeTab === 'emergency' && <CaseList cases={cases} type="Emergency" userRole={user.role} onEdit={openEditModal} onUpdateOrder={handleUpdateOrder} />}
                            {activeTab === 'analytics' && <Analytics cases={cases} />}
                            {activeTab === 'print' && <PrintTemplate cases={cases} />}
                        </main>
                    </div>

                    <CaseModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} onSave={handleSaveCase} editingCase={editingCase} userRole={user.role} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
